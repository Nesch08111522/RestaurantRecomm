<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ APP_NAME }} - Recomendación Inteligente de Restaurantes</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    
    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
    
    <style>
        :root {
            --primary: {{ PRIMARY_COLOR }};
            --primary-dark: {{ PRIMARY_COLOR }}cc;
            --primary-light: {{ PRIMARY_COLOR }}33;
            --secondary: {{ SECONDARY_COLOR }};
            --secondary-dark: {{ SECONDARY_COLOR }}cc;
            --font-main: 'Inter', sans-serif;
            --font-heading: 'Poppins', sans-serif;
            --shadow: 0 2px 16px rgba(0, 0, 0, 0.08);
            --radius: 12px;
            --transition: all 0.3s ease;
        }
    </style>
    
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% include 'partials/header.html' %}
    
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    {% include 'partials/footer.html' %}

    <!-- JavaScript Libraries -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script src="{{ url_for('static', filename='js/map.js') }}"></script>
    <script src="{{ url_for('static', filename='js/search.js') }}"></script>
    <script src="{{ url_for('static', filename='js/admin.js') }}"></script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
